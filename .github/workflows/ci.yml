name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip build
      - run: python -m pip install -e '.[test]'
      - run: python -m pytest -q
      - run: python -m build

  shell:
    name: Shell syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: find hpc/rosi -type f \( -name '*.sh' -o -name '*.sbatch' \) -print0 | xargs -0 -n1 bash -n

  dependency-layout:
    name: Pinned dependency layout
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Verify submodule pin
        run: test "$(git -C alpaka3-tuner rev-parse HEAD)" = "$(git rev-parse HEAD:alpaka3-tuner)"
      - name: Configure nested CPU build
        run: >-
          cmake -S . -B build -G Ninja
          -DALPAKATUNE_ML_ENABLE_CUDA=OFF
          -DALPAKATUNE_ML_BUILD_ALPAKATUNE_TESTS=OFF
          -DALPAKATUNE_ML_BUILD_ALPAKATUNE_HEADER_CHECKS=OFF
      - name: Verify generated dependency metadata
        run: test -s build/generated/alpakatune-paths.json
